# Release notes template used by `gh release edit --generate-notes`.
# Groups commits/PRs into categories based on labels and paths.
# See: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - ignore-for-release
      - duplicate
      - invalid
      - wontfix
    authors:
      - dependabot

  categories:
    - title: Features
      labels:
        - feat
        - feature
        - enhancement
    - title: Bug fixes
      labels:
        - fix
        - bug
    - title: Performance
      labels:
        - perf
        - performance
    - title: Refactoring & internals
      labels:
        - refactor
        - chore
        - internal
    - title: Documentation
      labels:
        - docs
        - documentation
    - title: Other
      labels:
        - "*"
