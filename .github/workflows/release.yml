name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub Release tag to publish artifacts to
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

concurrency:
  group: release-${{ github.event.release.id || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    steps:
      - name: Validate GitHub Release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release view "$RELEASE_TAG"

      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Python (Windows)
        if: matrix.platform == 'win'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Ensure native packages
        run: node scripts/ensure-rollup-native.cjs

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          if [ "$RELEASE_TAG" != "v$VERSION" ]; then
            echo "::error::Release tag $RELEASE_TAG does not match package.json version $VERSION."
            exit 1
          fi

      - name: Build native addon
        run: npm run build:ndi-native

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Package and publish (macOS)
        if: matrix.platform == 'mac'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CSC_LINK: ${{ secrets.APPLE_CSC_LINK }}
          APPLE_CSC_KEY_PASSWORD: ${{ secrets.APPLE_CSC_KEY_PASSWORD }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ -n "${APPLE_CSC_LINK:-}" ]; then
            export CSC_LINK="$APPLE_CSC_LINK"
            export CSC_KEY_PASSWORD="$APPLE_CSC_KEY_PASSWORD"
            export APPLE_ID="$APPLE_ID_SECRET"
            export APPLE_APP_SPECIFIC_PASSWORD="$APPLE_APP_SPECIFIC_PASSWORD_SECRET"
            export APPLE_TEAM_ID="$APPLE_TEAM_ID_SECRET"
            echo "::notice::Signing macOS build with provided Apple Developer ID certificate."
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            echo "::warning::APPLE_CSC_LINK secret not set; building unsigned macOS artifacts. See docs/release-setup.md."
          fi
          npx electron-builder --mac --publish always

      - name: Package and publish (Windows)
        if: matrix.platform == 'win'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${WIN_CSC_LINK:-}" ]; then
            export CSC_LINK="$WIN_CSC_LINK"
            export CSC_KEY_PASSWORD="$WIN_CSC_KEY_PASSWORD"
            echo "::notice::Signing Windows build with provided code-signing certificate."
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            echo "::warning::WIN_CSC_LINK secret not set; building unsigned Windows artifacts. See docs/release-setup.md."
          fi
          npx electron-builder --win --publish always

      - name: Package and publish (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
