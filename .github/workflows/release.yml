name: Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  guard:
    name: Check branch and release status
    if: github.event_name != 'pull_request' || github.base_ref == 'main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect.outputs.version }}
      is_new_version: ${{ steps.detect.outputs.is_new_version }}
      should_release: ${{ steps.detect.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect version and release status
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          GIT_REF: ${{ github.ref }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          LAST_TAG="$(gh release view --json tagName -q .tagName 2>/dev/null || echo '')"
          if [ "$LAST_TAG" = "v$VERSION" ]; then
            IS_NEW="false"
          else
            IS_NEW="true"
          fi
          echo "is_new_version=$IS_NEW" >> "$GITHUB_OUTPUT"

          if [ "$IS_NEW" = "true" ] && [ "$EVENT_NAME" != "pull_request" ] && [ "$GIT_REF" = "refs/heads/main" ]; then
            SHOULD="true"
          else
            SHOULD="false"
          fi
          echo "should_release=$SHOULD" >> "$GITHUB_OUTPUT"

          echo "::notice::package.json version=$VERSION, latest release=$LAST_TAG, is_new_version=$IS_NEW, should_release=$SHOULD"

  build:
    name: Build (${{ matrix.platform }})
    needs: guard
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Python (Windows)
        if: matrix.platform == 'win'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Ensure native packages
        run: node scripts/ensure-rollup-native.cjs

      - name: Build native addon
        run: npm run build:ndi-native

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Package signed (macOS)
        if: matrix.platform == 'mac' && needs.guard.outputs.should_release == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CSC_LINK: ${{ secrets.APPLE_CSC_LINK }}
          APPLE_CSC_KEY_PASSWORD: ${{ secrets.APPLE_CSC_KEY_PASSWORD }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ -n "${APPLE_CSC_LINK:-}" ]; then
            export CSC_LINK="$APPLE_CSC_LINK"
            export CSC_KEY_PASSWORD="$APPLE_CSC_KEY_PASSWORD"
            export APPLE_ID="$APPLE_ID_SECRET"
            export APPLE_APP_SPECIFIC_PASSWORD="$APPLE_APP_SPECIFIC_PASSWORD_SECRET"
            export APPLE_TEAM_ID="$APPLE_TEAM_ID_SECRET"
            echo "::notice::Signing macOS build with provided Apple Developer ID certificate."
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            echo "::warning::APPLE_CSC_LINK secret not set; building unsigned macOS artifacts. See docs/release-setup.md."
          fi
          npx electron-builder --mac --publish never

      - name: Package unsigned (macOS)
        if: matrix.platform == 'mac' && needs.guard.outputs.should_release != 'true'
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Package signed (Windows)
        if: matrix.platform == 'win' && needs.guard.outputs.should_release == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${WIN_CSC_LINK:-}" ]; then
            export CSC_LINK="$WIN_CSC_LINK"
            export CSC_KEY_PASSWORD="$WIN_CSC_KEY_PASSWORD"
            echo "::notice::Signing Windows build with provided code-signing certificate."
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            echo "::warning::WIN_CSC_LINK secret not set; building unsigned Windows artifacts. See docs/release-setup.md."
          fi
          npx electron-builder --win --publish never

      - name: Package unsigned (Windows)
        if: matrix.platform == 'win' && needs.guard.outputs.should_release != 'true'
        run: npx electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: lumacast-${{ matrix.platform }}
          if-no-files-found: error
          retention-days: 14
          path: |
            dist/*.AppImage
            dist/*.blockmap
            dist/*.deb
            dist/*.dmg
            dist/*.exe
            dist/*.zip
            dist/latest*.yml

  release:
    name: Publish release
    needs: [guard, build]
    if: needs.guard.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: lumacast-*
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.guard.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            --target "$GITHUB_SHA" \
            artifacts/*
