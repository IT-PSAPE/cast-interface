name: CI & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────
  # Decide whether this push should cut a new release.
  # A release is cut when package.json version does not match an
  # existing git tag `v<version>`. Bump version in package.json
  # and push to main to trigger a release.
  # ───────────────────────────────────────────────────────────────
  detect-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect version bump
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse --verify --quiet "refs/tags/v$VERSION" >/dev/null; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag v$VERSION already exists. Bump package.json version to cut a new release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag v$VERSION does not exist. Building and publishing a new release."
          fi

  # ───────────────────────────────────────────────────────────────
  # Build and package on all three platforms. Always runs (CI).
  # When a version bump is detected on main, electron-builder
  # uploads artifacts to a draft GitHub Release named v<version>.
  # ───────────────────────────────────────────────────────────────
  build:
    needs: detect-release
    if: always()
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    env:
      PUBLISH_MODE: ${{ needs.detect-release.outputs.should_release == 'true' && 'always' || 'never' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Python (Windows)
        if: matrix.platform == 'win'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Build native addon
        run: npm run build:ndi-native

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Package (macOS)
        if: matrix.platform == 'mac'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CSC_LINK: ${{ secrets.APPLE_CSC_LINK }}
          APPLE_CSC_KEY_PASSWORD: ${{ secrets.APPLE_CSC_KEY_PASSWORD }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "${APPLE_CSC_LINK:-}" ]; then
            export CSC_LINK="$APPLE_CSC_LINK"
            export CSC_KEY_PASSWORD="$APPLE_CSC_KEY_PASSWORD"
            export APPLE_ID="$APPLE_ID_SECRET"
            export APPLE_APP_SPECIFIC_PASSWORD="$APPLE_APP_SPECIFIC_PASSWORD_SECRET"
            export APPLE_TEAM_ID="$APPLE_TEAM_ID_SECRET"
            echo "::notice::Signing macOS build with provided Apple Developer ID certificate."
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            echo "::warning::APPLE_CSC_LINK secret not set; building unsigned macOS artifacts. See docs/release-setup.md."
          fi
          npx electron-builder --mac --publish ${{ env.PUBLISH_MODE }}

      - name: Package (Windows)
        if: matrix.platform == 'win'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if [ -n "${WIN_CSC_LINK:-}" ]; then
            export CSC_LINK="$WIN_CSC_LINK"
            export CSC_KEY_PASSWORD="$WIN_CSC_KEY_PASSWORD"
            echo "::notice::Signing Windows build with provided code-signing certificate."
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            echo "::warning::WIN_CSC_LINK secret not set; building unsigned Windows artifacts. See docs/release-setup.md."
          fi
          npx electron-builder --win --publish ${{ env.PUBLISH_MODE }}

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish ${{ env.PUBLISH_MODE }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload CI artifacts (non-release runs)
        if: env.PUBLISH_MODE == 'never'
        uses: actions/upload-artifact@v6
        with:
          name: recast-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/latest*.yml
          if-no-files-found: error
          retention-days: 14

  # ───────────────────────────────────────────────────────────────
  # After all three platforms have uploaded their artifacts to the
  # draft release, promote the release from draft -> published and
  # regenerate notes from commits since the previous tag.
  # ───────────────────────────────────────────────────────────────
  publish-release:
    needs: [detect-release, build]
    if: needs.detect-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Promote draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          VERSION: ${{ needs.detect-release.outputs.version }}
        run: |
          set -euo pipefail
          echo "Publishing v$VERSION"
          release_notes_file="$(mktemp)"
          release_title="$(
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "/repos/$REPOSITORY/releases/generate-notes" \
              -f tag_name="v$VERSION" \
              --jq '.name'
          )"
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPOSITORY/releases/generate-notes" \
            -f tag_name="v$VERSION" \
            --jq '.body' > "$release_notes_file"
          gh release edit "v$VERSION" \
            --draft=false \
            --latest \
            --title "$release_title" \
            --notes-file "$release_notes_file"
          echo "::notice::Release v$VERSION published at $(gh release view v$VERSION --json url -q .url)"
